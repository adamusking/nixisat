; ─────────────────────────────────────────────────────────────────────────────
; PlatformIO Project Configuration
; ESP32-S3-WROOM-1 N16R8 — HTTP MJPEG Camera Streamer
; ─────────────────────────────────────────────────────────────────────────────

[env:esp32-s3-devkitc-1]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

; ── Flash & PSRAM (N16R8: 16 MB QIO Flash, 8 MB OPI PSRAM) ──────────────────
board_upload.flash_size         = 16MB
board_build.flash_mode          = qio
board_build.arduino.memory_type = qio_opi   ; QIO flash + OPI PSRAM

; Partition: huge_app gives 3 MB app space — required for camera + HTTP server
board_build.partitions          = huge_app.csv

; ── Serial monitor ───────────────────────────────────────────────────────────
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, time

; ── Upload ───────────────────────────────────────────────────────────────────
upload_speed = 921600

; ── Libraries ────────────────────────────────────────────────────────────────
lib_deps =
    knolleary/PubSubClient@^2.8
    jgromes/RadioLib@^7.4.0
    tinyu-zhao/TinyGPSPlus-ESP32@^0.0.2
    mikalhart/TinyGPSPlus@^1.1.0
    slashdevin/NeoGPS@^4.2.9
    hideakitai/MPU9250@^0.4.8
    adafruit/Adafruit Unified Sensor@^1.1.15
    adafruit/Adafruit BME280 Library@^2.3.0
    arduino-libraries/Madgwick@^1.2.0
    espressif/esp32-camera@^2.0.4  ; provides esp_camera.h

; ── Build flags ──────────────────────────────────────────────────────────────
build_flags =
    ; PSRAM — required for OV5640 at XGA
    -DBOARD_HAS_PSRAM

    ; Logging: 1=Error, 2=Warn, 3=Info, 4=Debug, 5=Verbose
    -DCORE_DEBUG_LEVEL=1

    ; HTTP server — enough sockets for stream + control + status simultaneously
    -DCONFIG_ESP_HTTP_SERVER_MAX_OPEN_SOCKETS=8
    -DCONFIG_HTTPD_MAX_REQ_HDR_LEN=1024
    -DCONFIG_HTTPD_MAX_URI_LEN=512

    ; HTTP server task stack — 16 KB needed for the MJPEG stream loop
    -DCONFIG_HTTPD_STACK_SIZE=16384

    ; LwIP — enough TCP connections for concurrent browser + polling
    -DCONFIG_LWIP_MAX_ACTIVE_TCP=16
    -DCONFIG_LWIP_MAX_LISTENING_TCP=16

    ; Watchdog: give the stream handler enough time between resets
    -DCONFIG_ESP_TASK_WDT_TIMEOUT_S=10